<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Instellation 2025 — MCA Tech Fest | DSATM</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#020408;--deep:#050c18;--navy:#071220;
  --gold:#c9a84c;--gold-l:#f0c96d;--gold-d:rgba(201,168,76,0.12);
  --gold-glow:rgba(201,168,76,0.35);
  --white:#e8eaf0;--dim:#6a7d96;--dim2:#4a5f78;
  --card-glass:rgba(7,18,40,0.6);
  --border:rgba(201,168,76,0.15);--border2:rgba(201,168,76,0.3);
  --ease:cubic-bezier(0.23,1,0.32,1);
}
html{font-size:16px;scroll-behavior:smooth;overflow-x:hidden}
body{background:var(--black);color:var(--white);font-family:'Poppins',sans-serif;overflow-x:hidden;min-height:100vh;cursor:none}

/* CURSOR */
#cur{position:fixed;width:8px;height:8px;background:var(--gold-l);border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .2s,height .2s;will-change:transform;mix-blend-mode:screen}
#cur-ring{position:fixed;width:32px;height:32px;border:1.5px solid rgba(201,168,76,0.45);border-radius:50%;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);will-change:transform;transition:width .3s,height .3s,border-color .3s}

/* GALAXY */
#galaxy{position:fixed;inset:0;z-index:0;pointer-events:none}

/* PAGE VEIL */
#veil{position:fixed;inset:0;z-index:9000;pointer-events:none;background:linear-gradient(135deg,var(--navy),var(--black));opacity:0;transition:opacity .5s ease}
#veil.in{opacity:1;pointer-events:all}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--black);z-index:99990;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.5rem;transition:opacity 1s,visibility 1s}
#loader.gone{opacity:0;visibility:hidden;pointer-events:none}
.ld-scene{position:relative;width:150px;height:150px;display:flex;align-items:center;justify-content:center}
.ld-planet{width:72px;height:72px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#2563d4,#0a1a40 55%,#020408 85%);box-shadow:0 0 60px rgba(37,99,212,.7),inset -12px -12px 24px rgba(0,0,0,.7);animation:ldPulse 2s ease-in-out infinite}
@keyframes ldPulse{0%,100%{box-shadow:0 0 50px rgba(37,99,212,.6)}50%{box-shadow:0 0 90px rgba(37,99,212,.9)}}
.ld-ring-wrap{position:absolute;width:130px;height:30px;top:50%;left:50%;transform:translate(-50%,-50%) rotateX(74deg);animation:ldRing 2.5s linear infinite}
@keyframes ldRing{to{transform:translate(-50%,-50%) rotateX(74deg) rotateZ(360deg)}}
.ld-ring{width:100%;height:100%;border:2.5px solid rgba(201,168,76,.5);border-radius:50%;box-shadow:0 0 15px var(--gold-glow)}
.ld-orbit{position:absolute;width:110px;height:110px;top:50%;left:50%;transform:translate(-50%,-50%);animation:ldOrb 2s linear infinite}
@keyframes ldOrb{to{transform:translate(-50%,-50%) rotate(360deg)}}
.ld-moon{position:absolute;top:-5px;left:50%;width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold-glow);transform:translateX(-50%)}
.ld-logo{display:flex}
.ld-char{font-family:'Orbitron',monospace;font-size:1.5rem;font-weight:900;color:var(--gold);opacity:0;transform:translateY(16px);animation:ldChar .08s var(--ease) forwards}
@keyframes ldChar{to{opacity:1;transform:translateY(0)}}
.ld-progress{width:200px;height:1px;background:rgba(201,168,76,.12);border-radius:1px;overflow:hidden;position:relative}
.ld-bar{height:100%;background:linear-gradient(90deg,transparent,var(--gold),var(--gold-l));width:0%;transition:width .05s linear}
.ld-status{font-family:'Orbitron',monospace;font-size:.58rem;color:var(--dim);letter-spacing:3px;text-transform:uppercase}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 2.5rem;transition:background .4s,padding .3s,border-color .3s}
nav.scrolled{background:rgba(2,4,8,.92);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);padding:.7rem 2.5rem}
.nav-logo{font-family:'Orbitron',monospace;font-size:1rem;font-weight:900;letter-spacing:4px;cursor:pointer;user-select:none;background:linear-gradient(90deg,var(--gold-l),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;gap:1.8rem;list-style:none}
.nav-links a{font-size:.64rem;color:var(--dim);text-decoration:none;letter-spacing:2px;font-family:'Orbitron',monospace;font-weight:500;text-transform:uppercase;cursor:pointer;transition:color .25s;position:relative;padding-bottom:3px}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--gold);transition:width .3s var(--ease)}
.nav-links a:hover,.nav-links a.active{color:var(--gold-l)}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}
.nav-cta{font-family:'Orbitron',monospace;font-size:.62rem;padding:.48rem 1.2rem;border:1px solid var(--gold);color:var(--gold);background:rgba(201,168,76,.08);cursor:pointer;letter-spacing:2px;text-transform:uppercase;border-radius:3px;transition:all .3s var(--ease);backdrop-filter:blur(8px)}
.nav-cta:hover{background:var(--gold);color:var(--black);box-shadow:0 0 30px var(--gold-glow);transform:translateY(-1px)}
.nav-ham{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:.3rem}
.nav-ham span{display:block;width:22px;height:1.5px;background:var(--gold);border-radius:2px;transition:.3s}
.m-menu{position:fixed;top:0;left:0;right:0;bottom:0;z-index:490;background:rgba(2,4,8,.97);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.2rem;opacity:0;pointer-events:none;transition:opacity .4s}
.m-menu.open{opacity:1;pointer-events:all}
.m-menu a{font-family:'Orbitron',monospace;font-size:1.1rem;color:var(--dim);letter-spacing:4px;text-transform:uppercase;cursor:pointer;transition:color .3s}
.m-menu a:hover{color:var(--gold)}
.m-close{position:absolute;top:1.5rem;right:1.5rem;background:none;border:none;cursor:pointer;color:var(--dim);font-size:1.4rem;transition:color .3s}
.m-close:hover{color:var(--gold)}

/* PAGE */
.page{position:relative;z-index:1;min-height:100vh;animation:pgIn .5s var(--ease) both}
@keyframes pgIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8rem 2rem 5rem;overflow:hidden;position:relative}
.hero-glow{position:absolute;border-radius:50%;pointer-events:none;filter:blur(80px)}
.hero-glow-1{width:60vw;height:60vw;top:-20%;left:-15%;background:radial-gradient(circle,rgba(30,75,180,.1),transparent 70%);animation:ambientFloat 9s ease-in-out infinite}
.hero-glow-2{width:50vw;height:50vw;bottom:-20%;right:-10%;background:radial-gradient(circle,rgba(201,168,76,.06),transparent 70%);animation:ambientFloat 12s ease-in-out infinite reverse}
@keyframes ambientFloat{0%,100%{transform:scale(1) translate(0,0)}50%{transform:scale(1.08) translate(2%,3%)}}
.planet-sys{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.fp{position:absolute;border-radius:50%;animation:fpFloat var(--dur,9s) ease-in-out infinite;animation-delay:var(--del,0s)}
@keyframes fpFloat{0%,100%{transform:translateY(0) rotateY(0deg)}33%{transform:translateY(-20px) rotateY(12deg)}66%{transform:translateY(8px) rotateY(-8deg)}}
.hero-eyebrow{font-family:'Orbitron',monospace;font-size:.68rem;letter-spacing:6px;color:var(--gold);text-transform:uppercase;margin-bottom:1.5rem;position:relative;z-index:2;opacity:0;animation:eyeIn .9s .35s var(--ease) forwards}
@keyframes eyeIn{from{opacity:0;letter-spacing:12px}to{opacity:1;letter-spacing:6px}}
.hero-title{font-family:'Orbitron',monospace;font-size:clamp(3.5rem,10vw,8.5rem);font-weight:900;line-height:.9;letter-spacing:.02em;display:flex;justify-content:center;flex-wrap:wrap;position:relative;z-index:2;margin-bottom:1.2rem;perspective:600px}
.tc{display:inline-block;background:linear-gradient(145deg,var(--white) 0%,var(--gold-l) 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:0;transform:translateY(55px) rotateX(-80deg);transform-origin:center bottom;animation:tcIn .65s var(--ease) forwards;animation-delay:var(--cd,0s);transition:filter .3s}
.tc:hover{filter:drop-shadow(0 0 25px rgba(201,168,76,.8));cursor:default}
@keyframes tcIn{to{opacity:1;transform:translateY(0) rotateX(0)}}
.title-shimmer{position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(201,168,76,.18) 50%,transparent 100%);background-size:200% 100%;animation:shimmerMove 4s 2.2s ease-in-out infinite;pointer-events:none}
@keyframes shimmerMove{0%,100%{background-position:200% 0}50%{background-position:-200% 0}}
.hero-tagline{font-size:clamp(.85rem,2vw,1.05rem);color:var(--dim);font-weight:300;letter-spacing:3px;position:relative;z-index:2;opacity:0;animation:fadeUp .8s 1.2s var(--ease) forwards}
.hero-meta{display:flex;gap:2.5rem;margin:2rem 0 1.5rem;flex-wrap:wrap;justify-content:center;position:relative;z-index:2;opacity:0;animation:fadeUp .8s 1.4s var(--ease) forwards}
.hm-item .hm-l{font-size:.58rem;color:var(--gold);letter-spacing:3px;font-family:'Orbitron',monospace;text-transform:uppercase;margin-bottom:.3rem}
.hm-item .hm-v{font-size:.9rem;color:var(--white);font-weight:500}
.countdown{display:flex;align-items:center;gap:.8rem;margin:1.2rem 0;flex-wrap:wrap;justify-content:center;position:relative;z-index:2;opacity:0;animation:fadeUp .8s 1.5s var(--ease) forwards}
.cd-box{min-width:76px;padding:1rem 1.1rem;text-align:center;background:rgba(7,18,40,.55);border:1px solid var(--border);border-radius:6px;backdrop-filter:blur(16px);position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05);transition:border-color .3s,box-shadow .3s}
.cd-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.6),transparent)}
.cd-box:hover{border-color:var(--border2);box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 25px var(--gold-glow),inset 0 1px 0 rgba(255,255,255,.05)}
.cd-num{font-family:'Orbitron',monospace;font-size:2rem;font-weight:700;color:var(--gold-l);line-height:1;display:block;text-shadow:0 0 30px rgba(201,168,76,.5)}
.cd-lbl{font-size:.56rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:.3rem;display:block}
.cd-sep{font-family:'Orbitron',monospace;font-size:2rem;color:var(--gold);opacity:.4;align-self:flex-end;padding-bottom:.7rem;animation:sepBlink 2s ease-in-out infinite}
@keyframes sepBlink{0%,100%{opacity:.4}50%{opacity:.85}}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;margin-top:1.2rem;position:relative;z-index:2;opacity:0;animation:fadeUp .8s 1.7s var(--ease) forwards}

/* GLASSMORPHISM BUTTONS */
.btn-g{font-family:'Orbitron',monospace;font-size:.68rem;padding:.85rem 2.2rem;letter-spacing:2px;text-transform:uppercase;border-radius:4px;cursor:pointer;position:relative;overflow:hidden;transition:all .4s var(--ease);backdrop-filter:blur(12px)}
.btn-g::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,rgba(255,255,255,0) 50%,rgba(255,255,255,.04) 100%);pointer-events:none}
.btn-g::after{content:'';position:absolute;top:-50%;left:-60%;width:50%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transform:skewX(-20deg);transition:left .5s var(--ease)}
.btn-g:hover::after{left:120%}
.btn-p{background:rgba(201,168,76,.22);border:1px solid rgba(201,168,76,.6);color:var(--gold-l);font-weight:700}
.btn-p:hover{background:rgba(201,168,76,.38);box-shadow:0 0 40px rgba(201,168,76,.4),0 8px 32px rgba(0,0,0,.3);transform:translateY(-3px);border-color:var(--gold-l)}
.btn-o{background:rgba(7,18,40,.45);border:1px solid rgba(201,168,76,.28);color:var(--dim)}
.btn-o:hover{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.5);color:var(--white);transform:translateY(-3px)}
.btn-ghost{background:transparent;border:1px solid rgba(122,138,160,.22);color:var(--dim2);font-size:.62rem;padding:.6rem 1.4rem}
.btn-ghost:hover{border-color:var(--border2);color:var(--dim);background:rgba(201,168,76,.04)}

.scroll-hint{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.5rem;z-index:2;opacity:0;animation:fadeIn 1s 2.6s forwards}
.scroll-hint span{font-family:'Orbitron',monospace;font-size:.54rem;color:var(--dim2);letter-spacing:3px;text-transform:uppercase}
.scroll-mouse{width:22px;height:34px;border:1px solid rgba(122,138,160,.3);border-radius:12px;display:flex;justify-content:center;padding-top:5px}
.scroll-wheel{width:2px;height:8px;background:var(--gold);border-radius:2px;animation:sw 2s ease-in-out infinite}
@keyframes sw{0%,100%{opacity:1;transform:translateY(0)}50%{opacity:0;transform:translateY(10px)}}
@keyframes fadeIn{to{opacity:1}}

/* PARALLAX BAND */
.para-band{height:180px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:linear-gradient(180deg,transparent,rgba(37,99,212,.04),transparent);position:relative}
.para-text{font-family:'Orbitron',monospace;font-size:clamp(4rem,10vw,9rem);font-weight:900;color:rgba(201,168,76,.04);letter-spacing:8px;white-space:nowrap;animation:ptScroll 22s linear infinite}
@keyframes ptScroll{from{transform:translateX(15%)}to{transform:translateX(-15%)}}

/* SECTIONS */
.section{padding:6rem 2.5rem;max-width:1200px;margin:0 auto}
.s-header{text-align:center;margin-bottom:4rem}
.s-label{font-family:'Orbitron',monospace;font-size:.64rem;letter-spacing:5px;color:var(--gold);text-transform:uppercase;margin-bottom:.8rem;display:block}
.s-title{font-family:'Orbitron',monospace;font-size:clamp(1.9rem,4vw,3rem);font-weight:700;line-height:1.1;color:var(--white)}
.s-title em{color:transparent;-webkit-text-stroke:1px var(--gold);font-style:normal}
.s-desc{color:var(--dim);margin-top:.9rem;font-size:.9rem;line-height:1.85;font-weight:300;max-width:580px;margin-left:auto;margin-right:auto}
.s-line{width:1px;height:55px;background:linear-gradient(180deg,var(--gold),transparent);margin:1.5rem auto 0}

/* CLAY CARDS */
.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:1.5rem}
.clay{background:linear-gradient(145deg,rgba(10,25,55,.82),rgba(5,12,24,.96));border:1px solid var(--border);border-radius:16px;padding:2rem;cursor:pointer;transition:all .5s var(--ease);position:relative;overflow:hidden;box-shadow:0 4px 0 rgba(0,0,0,.5),0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06)}
.clay::before{content:'';position:absolute;inset:0;border-radius:16px;background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.06),transparent 65%);opacity:0;transition:opacity .4s}
.clay::after{content:'';position:absolute;top:-2px;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.4),transparent);border-radius:2px;opacity:0;transition:opacity .4s}
.clay:hover{border-color:rgba(201,168,76,.38);transform:translateY(-10px) scale(1.01);box-shadow:0 0 0 rgba(0,0,0,0),0 32px 64px rgba(0,0,0,.65),0 0 50px rgba(201,168,76,.1),inset 0 1px 0 rgba(255,255,255,.09)}
.clay:hover::before{opacity:1}
.clay:hover::after{opacity:1}
.cp-wrap{width:56px;height:56px;margin-bottom:1.2rem;position:relative;flex-shrink:0}
.cp{width:52px;height:52px;border-radius:50%;position:relative;box-shadow:var(--cpg,0 0 25px rgba(37,99,212,.5));transition:box-shadow .4s,transform .4s;animation:cpSpin 10s ease-in-out infinite}
.clay:hover .cp{box-shadow:var(--cpgh,0 0 50px rgba(37,99,212,.8));transform:scale(1.12) rotate(18deg);animation-play-state:paused}
@keyframes cpSpin{0%,100%{filter:brightness(1)}50%{filter:brightness(1.25)}}
.sat-ring{position:absolute;width:88px;height:20px;border:2px solid rgba(201,168,76,.35);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%) rotateX(75deg);animation:satSpin 5s linear infinite;box-shadow:0 0 10px rgba(201,168,76,.1)}
@keyframes satSpin{to{transform:translate(-50%,-50%) rotateX(75deg) rotateZ(360deg)}}
.earth-p{background:linear-gradient(170deg,rgba(30,144,255,.75) 0%,rgba(30,144,255,.35) 30%,transparent 50%),radial-gradient(circle at 40% 40%,#1e6419,#0a5028 40%,#083a1e 70%,#020f08 100%);animation:earthSpin 14s linear infinite!important}
@keyframes earthSpin{0%{background:linear-gradient(170deg,rgba(30,144,255,.75) 0%,rgba(30,144,255,.35) 30%,transparent 50%),radial-gradient(circle at 20% 40%,#1e6419,#0a5028 40%,#083a1e 70%,#020f08 100%)}100%{background:linear-gradient(170deg,rgba(30,144,255,.75) 0%,rgba(30,144,255,.35) 30%,transparent 50%),radial-gradient(circle at 80% 40%,#1e6419,#0a5028 40%,#083a1e 70%,#020f08 100%)}}
.mars-p{animation:marsPulse 2.5s ease-in-out infinite!important}
@keyframes marsPulse{0%,100%{box-shadow:0 0 25px rgba(180,50,20,.5)}50%{box-shadow:0 0 55px rgba(220,80,30,.85)}}
.e-plbl{font-family:'Orbitron',monospace;font-size:.58rem;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:.4rem;opacity:.8}
.e-name{font-family:'Orbitron',monospace;font-size:.97rem;font-weight:700;color:var(--white);margin-bottom:.3rem;line-height:1.3}
.e-sub{font-size:.76rem;color:var(--gold);margin-bottom:.7rem;font-weight:500}
.e-desc{font-size:.8rem;color:var(--dim);line-height:1.7;font-weight:300}
.e-footer{display:flex;gap:1.2rem;margin-top:1.2rem;padding-top:1rem;border-top:1px solid rgba(201,168,76,.08)}
.efi .efi-l{font-size:.54rem;color:var(--dim2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.15rem}
.efi .efi-v{font-size:.8rem;color:var(--white);font-weight:500}
.efi:first-child .efi-v{color:var(--gold)}
.e-cta{position:absolute;bottom:1.3rem;right:1.4rem;font-family:'Orbitron',monospace;font-size:.6rem;color:var(--gold);opacity:0;transform:translateX(-5px);transition:all .35s var(--ease);letter-spacing:1px}
.clay:hover .e-cta{opacity:1;transform:translateX(0)}

/* DETAIL */
.dt-hero{padding:9rem 2rem 4rem;text-align:center;background:radial-gradient(ellipse at 50% 0%,rgba(37,99,212,.07),transparent 58%);border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.dt-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.3}
.dt-planet{width:100px;height:100px;border-radius:50%;margin:0 auto 1.5rem;position:relative;animation:dtFloat 4s ease-in-out infinite}
@keyframes dtFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
.dt-ring{position:absolute;width:170px;height:40px;border:2px solid rgba(201,168,76,.35);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%) rotateX(74deg);animation:satSpin 6s linear infinite}
.dt-lbl{font-family:'Orbitron',monospace;font-size:.6rem;color:var(--gold);letter-spacing:4px;text-transform:uppercase;display:block;margin-bottom:.7rem}
.dt-title{font-family:'Orbitron',monospace;font-size:clamp(2rem,5vw,4rem);font-weight:900;color:var(--white);margin-bottom:.4rem}
.dt-sub{color:var(--gold);font-size:1rem;font-weight:500}
.dt-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:1rem;margin:2.5rem 0}
.dt-stat{background:var(--card-glass);border:1px solid var(--border);border-radius:8px;padding:1.3rem;text-align:center;backdrop-filter:blur(8px);transition:all .3s var(--ease)}
.dt-stat:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.3)}
.dts-l{font-family:'Orbitron',monospace;font-size:.58rem;color:var(--dim2);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:.4rem}
.dts-v{font-family:'Orbitron',monospace;font-size:1.05rem;font-weight:700;color:var(--gold)}
.dt-sec{margin:2.2rem 0}
.dt-sec h3{font-family:'Orbitron',monospace;font-size:.72rem;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:.9rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.8rem}
.dt-sec h3::before{content:'';display:inline-block;width:5px;height:5px;background:var(--gold);border-radius:50%;box-shadow:0 0 8px var(--gold-glow)}
.dt-p{font-size:.88rem;color:var(--dim);line-height:1.95;font-weight:300}
.rules-ul{list-style:none;display:flex;flex-direction:column;gap:.6rem}

/* GALAXY CANVAS */
function initGalaxy(){
  const cv=document.getElementById('galaxy'),ctx=cv.getContext('2d');
  let W,H,stars=[],parts=[],t=0;
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;mkStars();}
  function mkStars(){
    stars=[];const n=Math.floor(W*H/4200);
    for(let i=0;i<n;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.2,a:Math.random(),da:(Math.random()-.5)*.005,hue:Math.random()>.9?(Math.random()>.5?200:40):0,sat:Math.random()>.9?55:0});
    parts=[];for(let i=0;i<45;i++)parts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.28,vy:(Math.random()-.5)*.14,r:Math.random()*.8+.2,a:Math.random()*.38+.05});
  }
  function draw(){
    ctx.clearRect(0,0,W,H);t+=.0018;
    // Nebula layers
    [[W*.2+W*.04*Math.sin(t),H*.3+H*.035*Math.cos(t*.7),W*.44,'rgba(14,38,118,']
    ,[W*.8-W*.035*Math.sin(t*.8),H*.7+H*.045*Math.cos(t),W*.33,'rgba(80,18,8,']
    ].forEach(([gx,gy,r,col])=>{const g=ctx.createRadialGradient(gx,gy,0,gx,gy,r);g.addColorStop(0,col+((.1+.03*Math.sin(t))+')'));g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);});
    stars.forEach(s=>{s.a+=s.da;if(s.a<=.04||s.a>=1)s.da*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=s.sat>0?`hsla(${s.hue},${s.sat}%,80%,${s.a})`:`rgba(232,234,240,${s.a})`;ctx.fill();});
    parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(201,168,76,${p.a})`;ctx.fill();});
    requestAnimationFrame(draw);
  }
  resize();draw();window.addEventListener('resize',resize);
}

/* CURSOR */
function initCursor(){
  const dot=document.getElementById('cur'),ring=document.getElementById('cur-ring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
  (function a(){rx+=(mx-rx)*.13;ry+=(my-ry)*.13;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(a);})();
  document.addEventListener('mousedown',()=>{dot.style.width='4px';dot.style.height='4px';ring.style.width='48px';ring.style.height='48px';});
  document.addEventListener('mouseup',()=>{dot.style.width='8px';dot.style.height='8px';ring.style.width='32px';ring.style.height='32px';});
}

/* REVEAL */
function initReveal(){
  const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)';obs.unobserve(e.target);}});},{threshold:.12});
  document.querySelectorAll('.clay,.pm-card,.dt-stat,.sp-box,.coord-card,.tl-content').forEach(el=>{if(!el.style.opacity){el.style.opacity='0';el.style.transform='translateY(26px)';el.style.transition='opacity .65s cubic-bezier(0.23,1,0.32,1),transform .65s cubic-bezier(0.23,1,0.32,1)';}obs.observe(el);});
}

/* TIMELINE */
function initTL(){
  const items=document.querySelectorAll('.tl-item'),fill=document.getElementById('tlFill');
  tlObs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis');});},{threshold:.18});
  items.forEach(el=>tlObs.observe(el));
  if(fill){
    function upd(){const o=document.getElementById('tlOuter');if(!o)return;const r=o.getBoundingClientRect();const pr=Math.max(0,Math.min(1,(window.innerHeight-r.top)/(r.height+window.innerHeight)));fill.style.transform=`scaleY(${pr})`;}
    window.addEventListener('scroll',upd,{passive:true});upd();
  }
}

function render(){
  let html='';

/* LOADER */
function runLoader(){
  const logo=document.getElementById('ldLogo'),bar=document.getElementById('ldBar'),status=document.getElementById('ldStatus');
  const phases=['Mapping the cosmos…','Aligning planets…','Loading event data…','Calibrating countdown…','Ready for launch…'];
  'INSTELLATION'.split('').forEach((c,i)=>{const s=document.createElement('span');s.className='ld-char';s.textContent=c;s.style.animationDelay=(.5+i*.07)+'s';logo.appendChild(s);});
  let prog=0;const iv=setInterval(()=>{prog=Math.min(100,prog+Math.random()*8+3);bar.style.width=prog+'%';const pi=Math.min(4,Math.floor(prog/22));if(phases[pi])status.textContent=phases[pi];if(prog>=100){clearInterval(iv);setTimeout(()=>document.getElementById('loader').classList.add('gone'),400);}},80);
}

window.addEventListener('load',()=>{
  initGalaxy();initCursor();initNav();render();runLoader();
});
